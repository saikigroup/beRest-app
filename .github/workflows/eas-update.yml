name: EAS Update (OTA)

# Setiap push ke branch develop/main/claude/* → otomatis update di dev app
on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
    paths-ignore:
      - 'portal/**'
      - '*.md'
      - '.github/workflows/portal-*.yml'

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA Update
        env:
          CI: 1
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          eas update \
            --branch "$BRANCH_NAME" \
            --message "${{ github.event.head_commit.message }}"
