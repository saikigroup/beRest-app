name: EAS Update (OTA)

# Setiap push ke branch develop/main/claude/* → otomatis OTA update
on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
    paths-ignore:
      - 'portal/**'
      - '*.md'
      - '.github/workflows/portal-*.yml'

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine channel and environment
        id: channel
        run: |
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            echo "channel=production" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "channel=preview" >> $GITHUB_OUTPUT
            echo "environment=preview" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA Update
        env:
          CI: 1
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use only first line of commit message to avoid CLI parsing issues
          MSG=$(echo "$COMMIT_MSG" | head -n 1 | cut -c 1-100)
          eas update \
            --channel "${{ steps.channel.outputs.channel }}" \
            --environment "${{ steps.channel.outputs.environment }}" \
            --message "$MSG"
